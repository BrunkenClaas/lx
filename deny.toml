[licenses]
# Only allow permissive licenses that do not impose usage restrictions.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unlicense",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
]
# Confidence threshold for license detection (0.0 - 1.0)
confidence-threshold = 0.8

[advisories]
# Deny crates with known security vulnerabilities from RUSTSEC database.
version = 2
ignore = []

[bans]
# Deny multiple versions of the same crate (flag for review).
multiple-versions = "warn"
# Warn on wildcard deps; workspace-internal path deps are exempt by design.
wildcards = "warn"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
