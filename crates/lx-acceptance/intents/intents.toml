name = "anon-meeting-notes"
args = ["--anon"]
stdin = "text/meeting-notes.txt"
json_field = "redacted_text"
structural = true

# ── lxsecret ─────────────────────────────────────────────────────────────────
# NOTE: the prompt's "uncertain" assessment category was previously defined but
# never modeled in a few-shot (overfit smell — see docs/design_document.md §7.2.1);
# fixed by anchoring it with an example. No dedicated regression intent for THAT
# fix: "does it say uncertain on input X" would assert the LLM's exact judgment
# (the thing the golden rule below forbids), and `must_match` cannot express
# "every assessment value is one of the three valid strings" (it is a contains-
# match check, not a for-all check). The leak-guard intents below remain the
# regression net for this tool; deeper category coverage belongs in eval.rs with
# a hand-picked ambiguous fixture and human/--judge review, not a substring assert.
#
# Detection output must mask the secret; the raw value must not appear.
[[intent]]
tool = "lxsecret"
name = "detect-in-adversarial"
stdin = "adversarial/secrets.txt"
json_field = "findings"
must_not_contain = ["AKIAJ3MV4BNZC9X7PQRF", "ghp_16C7e42F", "xoxb-"]

[[intent]]
tool = "lxsecret"
name = "scan-clean-code"
stdin = "code/auth.rs"
json_field = "findings"
# Clean code may legitimately have zero findings; just assert no raw secret leaks.
must_not_contain = ["AKIAIOSFODNN7EXAMPLE", "ghp_", "-----BEGIN"]

# Credential-keyword assignment detection: human passwords + hyphenated api-key +
# high-entropy bare `key` must be flagged (high_entropy_secret), while the prose
# mention, the `key: production` config map-value, and the `password: test`
# placeholder must NOT be — and no raw value may leak (findings are masked).
[[intent]]
tool = "lxsecret"
name = "detect-keyword-passwords"
stdin = "adversarial/passwords.txt"
json_field = "findings"
must_match = "high_entropy_secret"
must_not_contain = [
    "Qw7k@PmRn!TvXs91",
    "correcthorsebatterystaple",
    "Qw7kPmRnTvXs91zz",
    "production",
]

