# ── lxgitignore ──────────────────────────────────────────────────────────────
[[intent]]
tool = "lxgitignore"
name = "rust-vscode"
arg = "rust project with vscode"
json_field = "content"
case_insensitive = true
must_match = "(?i)target|\\.vscode"

# ── lxdockerfile ─────────────────────────────────────────────────────────────
[[intent]]
tool = "lxdockerfile"
name = "node-express-postgres"
arg = "node.js express app with postgres"
json_field = "content"
must_match = "(?i)FROM node"
must_not_contain = ["curl | sh", "curl|sh"]

[[intent]]
tool = "lxdockerfile"
name = "python-flask"
arg = "python 3.11 flask web service on port 8080"
json_field = "content"
must_match = "(?i)FROM python"
must_contain = ["EXPOSE"]

# ── lxmakefile ───────────────────────────────────────────────────────────────
[[intent]]
tool = "lxmakefile"
name = "rust-targets"
arg = "rust project with test, build, clippy targets"
json_field = "content"
must_match = "(?i)cargo"
must_contain = [".PHONY"]

# ── lxpatch ──────────────────────────────────────────────────────────────────
[[intent]]
tool = "lxpatch"
name = "patch-from-refactor-desc"
arg = "rename the function foo to compute_total"
stdin = "code/messy.py"
json_field = "diff"
must_match = "(?m)^---|^\\+\\+\\+|^@@"

# ── lxrename ─────────────────────────────────────────────────────────────────
