# ── lxfirewall ───────────────────────────────────────────────────────────────
# Allowing/restricting SSH correctly trips the lockout-risk guard (exit 3) — that
# is the intended safety behavior, not a failure.
[[intent]]
tool = "lxfirewall"
name = "allow-ssh-from-subnet-linux"
arg = "restrict the SSH port so only hosts on 172.16.0.0/12 can reach it"
args = ["--target", "linux"]
expect_exit = 3
must_match = "(?i)iptables|nft|ufw"
must_contain = ["22"]
must_not_contain = ["netsh", "New-NetFirewallRule"]

[[intent]]
tool = "lxfirewall"
name = "block-ip-windows"
arg = "drop everything coming in from the 203.0.113.0/24 network"
args = ["--target", "windows"]
must_contain = ["203.0.113.0"]
must_match = "(?i)netsh|New-NetFirewallRule"
must_not_contain = ["iptables", "nft "]

[[intent]]
tool = "lxfirewall"
name = "open-http-linux"
arg = "allow inbound HTTP on port 80 from anywhere"
args = ["--target", "linux"]
must_contain = ["80"]
must_match = "(?i)iptables|nft|ufw"

