# ── lxrsync ──────────────────────────────────────────────────────────────────
[[intent]]
tool = "lxrsync"
name = "mirror-with-delete"
arg = "mirror local dist to remote server:/var/www, delete extra files, exclude .git"
must_contain = ["rsync", "--delete"]
must_match = "(?i)--exclude"
expect_dangerous = true

# Regression — bare "mirror" is ambiguous and must default to a plain, non-destructive
# copy (no --delete) rather than assuming "remove extra files at the destination".
[[intent]]
tool = "lxrsync"
name = "bare-mirror-defaults-to-safe-copy"
arg = "mirror /srv/music over to /media/usb/music"
must_contain = ["rsync"]
must_not_contain = ["--delete"]
expect_dangerous = false

# Contrast — explicit "exact copy, remove anything extra" DOES call for --delete
# and must be flagged dangerous; this is the destructive reading of "mirror".
[[intent]]
tool = "lxrsync"
name = "explicit-exact-copy-uses-delete"
arg = "make /media/usb/music a byte-for-byte replica of /srv/music, dropping files that are no longer in the source"
must_contain = ["rsync", "--delete"]
expect_dangerous = true

[[intent]]
tool = "lxrsync"
name = "simple-copy"
arg = "copy local /data/photos to /mnt/backup/photos"
must_contain = ["rsync"]
must_not_contain = ["--delete"]
expect_dangerous = false

[[intent]]
tool = "lxrsync"
name = "dry-run"
arg = "preview a sync of /etc/nginx to /backup/nginx-conf without copying anything yet"
must_contain = ["rsync"]
# -n may be bundled into a combined flag like -avn
must_match = "(?i)--dry-run|-[a-z]*n\\b"

# ── lxffmpeg ─────────────────────────────────────────────────────────────────
[[intent]]
tool = "lxffmpeg"
name = "mov-to-1080p-mp4"
arg = "convert input.mov to 1080p mp4 at 30fps"
must_contain = ["ffmpeg", "-i", "input.mov"]
must_match = "(?i)scale|1080|libx264"

# The requested output format is mp3; `mp3` must appear. The previous
# `(?i)mp3|-vn|acodec` alternation let a WAV extraction (-vn -acodec pcm_s16le)
# pass despite the wrong format.
[[intent]]
tool = "lxffmpeg"
name = "extract-audio"
arg = "extract the audio track from movie.mp4 as mp3"
must_contain = ["ffmpeg", "-i", "movie.mp4"]
must_match = "(?i)mp3|libmp3lame"

# The 5s start offset is a stable necessary value (the end may be -to 20 or -t 15,
# so only the start is asserted as a literal); a seek flag must be present too.
[[intent]]
tool = "lxffmpeg"
name = "trim-clip"
arg = "trim clip.mp4 from 5 seconds to 20 seconds"
must_contain = ["ffmpeg", "clip.mp4", "5"]
must_match = "(?i)-ss|-to|-t "

