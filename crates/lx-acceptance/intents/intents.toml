# ── lxredact ─────────────────────────────────────────────────────────────────
# Adversarial: live-looking secrets on stdin must be masked, never echoed.
[[intent]]
tool = "lxredact"
name = "mask-adversarial-secrets"
stdin = "adversarial/secrets.txt"
json_field = "redacted_text"
must_not_contain = ["AKIAJ3MV4BNZC9X7PQRF", "ghp_", "-----BEGIN", "xoxb-"]

[[intent]]
