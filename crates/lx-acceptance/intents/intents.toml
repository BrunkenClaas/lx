# P: numeric form of the same errno; same must_match assertion.
[[intent]]
tool = "lxerrno"
name = "econnrefused-numeric"
arg = "errno 111"
json_field = "meaning"
must_match = "(?i)connection|refus"

# ── lxerrno PE ───────────────────────────────────────────────────────────────
# Unknown errno code → tool still returns a non-empty meaning field (graceful degradation).
[[intent]]
tool = "lxerrno"
name = "unknown-code-graceful"
arg = "errno 99999"
json_field = "meaning"
structural = true

# ── lxdraft P ────────────────────────────────────────────────────────────────
# Parent N: decline-meeting  (--kind email, arg = "decline the meeting politely, propose next week")
# P: rephrase the request; same kind, same structural assertion on body.
[[intent]]
tool = "lxdraft"
name = "decline-meeting-phrasing"
args = ["--kind", "email"]
arg = "politely turn down the meeting invitation and suggest an alternative next week"
prose = true
json_field = "body"

# ── lxask P ──────────────────────────────────────────────────────────────────
# Parent N: main-argument  (arg = "what is the main argument?", stdin = text/article.md)
# P: rephrase; same prose/structural assertion on answer.
[[intent]]
tool = "lxask"
name = "main-argument-phrasing"
arg = "what is the central thesis of this text?"
stdin = "text/article.md"
prose = true
json_field = "answer"

# ── lxundo P ─────────────────────────────────────────────────────────────────
# Parent N: undo-git-add  (arg = "git add .")
# P: rephrase "unstage all files"; same must_match assertion.
[[intent]]
tool = "lxundo"
name = "undo-git-add-phrasing"
arg = "I just ran git add . and want to unstage everything"
json_field = "undo_command"
must_match = "(?i)reset|restore"


# ── lxurl P ──────────────────────────────────────────────────────────────────
# Parent N: summarize-example-com  (arg = "https://example.com")
# P: lxurl takes a URL arg; use IANA's example domain (also static, stable).
# Same structural assertion on answer field.
[[intent]]
tool = "lxurl"
name = "fetch-example-com-phrasing"
arg = "https://www.iana.org/domains/reserved"
prose = true
json_field = "answer"

# ── lxchmod P ────────────────────────────────────────────────────────────────
# Parent N: private-key-needs-600  (arg = "a private SSH key file")
# P: rephrase; same must_contain assertions.
[[intent]]
tool = "lxchmod"
name = "private-key-phrasing"
arg = "an SSH private key that only the owner should read"
json_field = "suggestion"
must_contain = ["chmod", "600"]

# ── lxport P ─────────────────────────────────────────────────────────────────
# Parent N: explain-port-22  (arg = "22")
# P: lxport takes only a bare integer; use port 443 (HTTPS) as the phrasing
# variant — same tool, same assertion style, different number.
[[intent]]
tool = "lxport"
name = "explain-port-443"
arg = "443"
json_field = "likely_service"
must_match = "(?i)https|tls|ssl"

# ── lxtable P ────────────────────────────────────────────────────────────────
# Parent N: people-to-table  (arg = "Alice is 30 and an Engineer. Bob is 25 and a Designer.")
# P: rephrase phrasing; same column check.
[[intent]]
tool = "lxtable"
name = "people-to-table-phrasing"
arg = "Alice: age 30, role Engineer. Bob: age 25, role Designer."
json_field = "columns"
must_match = "(?i)name|age|role"
