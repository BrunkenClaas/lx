# ── lxundo ───────────────────────────────────────────────────────────────────
[[intent]]
tool = "lxundo"
name = "undo-git-add"
arg = "git add src/main.rs Cargo.toml"
json_field = "undo_command"
must_match = "(?i)reset|restore"

# Undoing a push has TWO legitimate strategies: a revert commit re-pushed, OR
# deleting the just-pushed remote branch. Both are correct, so neither is a
# necessary truth. The REAL invariant — what every correct undo must satisfy —
# is that it does not rewrite already-shared history. Assert one of the valid
# strategies is chosen, and forbid the genuinely unsafe history-rewriting ones.
[[intent]]
tool = "lxundo"
name = "undo-git-push"
arg = "git push origin develop"
json_field = "undo_command"
must_match = "(?i)revert|--delete|push +-d\\b"
must_not_contain = ["reset --hard", "reset HEAD~", "--force", "push -f", "-f origin"]

[[intent]]
tool = "lxundo"
name = "undo-mv"
arg = "mv quarterly-notes.txt ~/Documents/archive/"
json_field = "undo_command"
must_contain = ["mv", "quarterly-notes.txt"]

