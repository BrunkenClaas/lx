tool = "lxrename"
name = "rename-to-snake-case"
arg = "rename to snake_case"
stdin = "misc/file-list.txt"
json_field = "renames"
structural = true

# ── lxfixcmd ─────────────────────────────────────────────────────────────────
[[intent]]
tool = "lxfixcmd"
name = "fix-git-typo"
arg = "git psh origin main"
json_field = "command"
must_contain = ["git push"]

[[intent]]
tool = "lxfixcmd"
name = "fix-grep-typo"
args = ["--shell", "bash"]
arg = "gerp -r 'TODO' ."
json_field = "command"
must_contain = ["grep"]

