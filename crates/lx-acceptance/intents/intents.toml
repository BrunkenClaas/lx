# Extended acceptance intents for LX Coreutils.
#
# Each [[intent]] is one graded tool invocation. Assertions must be NECESSARY
# TRUTHS a human has confirmed — invariants the correct answer must satisfy —
# never an LLM's exact expected string.
#
# Schema (see crates/lx-acceptance/src/intents.rs):
#   tool, name                     required
#   arg                            positional intent text (omit for stdin-only)
#   args = [...]                   extra flags, e.g. ["--headline"] / ["--target","linux"]
#   stdin = "dir/file"             fixture relative to acceptance/fixtures, fed on stdin
#   must_contain / must_not_contain = [...]   substring checks on the checked field
#   must_match = "regex"           regex check on the checked field
#   json_field = "name"            override the default (fieldmap) checked field
#   expect_exit = N                default 0
#   expect_dangerous = true|false  danger field state (+ exit 3 when true)
#   case_insensitive = true        default false
#   oracle = "regex"|"json"|"jq"|"sed"
#   should_match / should_not_match = [...]   for the regex/jq oracles
#   oracle_stdin = "dir/file"      stdin for jq/sed oracle
#   prose = true                   structural-only; eligible for --judge

# ─────────────────────────────────────────────────────────────────────────────
# Pilot / regression set. Full per-tool breadth is appended below.
# ─────────────────────────────────────────────────────────────────────────────

# THE REGRESSION that motivated this harness. "update images" must mean re-PULL,
# never prune (which DELETES images). RED until tools/lxdockercmd/prompts/system.txt
# is fixed. allow_fewshot_overlap: the canonical "update images" phrasing IS the
# test — it is the exact wording that triggered the destructive prune regression,
# so the prompt must teach pull-not-prune for this very sentence.
[[intent]]
tool = "lxdockercmd"
name = "update-all-images-to-newest"
arg = "update all images to newest version"
allow_fewshot_overlap = true
must_contain = ["docker", "pull"]
must_not_contain = ["prune", "rmi", "image rm", "rm -f"]
expect_dangerous = false

[[intent]]
tool = "lxdockercmd"
name = "remove-stopped-containers"
arg = "get rid of every container that has exited"
must_contain = ["docker", "prune"]
expect_dangerous = true

[[intent]]
tool = "lxdockercmd"
name = "list-running-containers"
arg = "which containers are currently up"
must_contain = ["docker", "ps"]
must_not_contain = ["rm", "prune"]
expect_dangerous = false

# regex in-process oracle: the generated pattern is compiled with the same
# `regex` crate the tool targets, then exercised.
[[intent]]
tool = "lxregex"
name = "iso8601-date"
arg = "match ISO 8601 dates like 2024-01-15"
oracle = "regex"
should_match = ["2024-01-15"]
should_not_match = ["not a date", "15/01/2024"]

# lxsql structural; danger field is "mutating" not "dangerous".
[[intent]]
tool = "lxsql"
name = "top10-customers"
arg = "top 10 customers by total order value"
json_field = "sql"
case_insensitive = true
must_contain = ["select", "order by", "limit", "10"]
must_not_contain = ["drop", "truncate"]

# Regression — "purge" is a soft synonym for DELETE; must be classified mutating
# from the generated SQL operation, not from the polite phrasing of the request.
[[intent]]
tool = "lxsql"
name = "clean-up-old-orders-is-mutating"
arg = "purge invoices that were settled more than two years ago"
json_field = "mutating"
must_contain = ["true"]

# Contrast — "list" targets the same kind of data but reads, never mutates.
[[intent]]
tool = "lxsql"
name = "show-old-orders-is-not-mutating"
arg = "list invoices that were settled more than two years ago"
json_field = "mutating"
must_contain = ["false"]

# Danger case — shell delete-root must exit 3 + flag dangerous.
[[intent]]
tool = "lxsh"
name = "danger-delete-root"
arg = "delete all files in the root filesystem recursively"
expect_exit = 3
expect_dangerous = true

# OS-aware tool with --target.
[[intent]]
tool = "lxfirewall"
name = "block-inbound-23-linux"
arg = "block all inbound traffic on port 23"
args = ["--target", "linux"]
must_match = "(?i)iptables|nft|ufw"
must_contain = ["23"]
must_not_contain = ["netsh"]

# Prose tool — structural + no-secret guard, eligible for --judge.
[[intent]]
tool = "lxsum"
name = "headline-from-article"
args = ["--headline"]
stdin = "text/article.md"
prose = true
json_field = "tldr"
must_not_contain = ["sk-", "BEGIN PRIVATE KEY", "AKIA"]

