name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Building + linking a test binary per crate for a 79-crate workspace fills the
    # runner disk; thin the debug info so target/debug/ stays within the volume.
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5

      # ubuntu-latest ships ~30 GB of preinstalled SDKs we never use; reclaim it so
      # the full-workspace test link does not run out of disk (os error 28).
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /

      # Pinned to match rust-toolchain.toml. Bump both together (see CONTRIBUTING).
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (no network, no API key)
        run: cargo test --workspace
        # Eval-tests carry #[ignore] and are excluded by default

  build-targets:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    # `ring` (via rustls) compiles C, so cross-compiling to aarch64-musl needs an
    # aarch64 C cross-compiler; the gnu cross-gcc links musl static binaries fine
    # when cargo/cc-rs are pointed at it explicitly (default aarch64-linux-musl-gcc
    # does not exist on the runner). Harmless on the x86_64 leg (unused).
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
      CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space (Linux)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /

      # Pinned to match rust-toolchain.toml. Bump both together (see CONTRIBUTING).
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Build all tools
        run: cargo build --workspace --release --target ${{ matrix.target }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
